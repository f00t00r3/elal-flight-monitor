name: El Al Flight Monitor

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: flight-monitor
  cancel-in-progress: false

jobs:
  check-flights:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: |
            elal-nyc-state.json
            elal-nyc-lastsummary.txt
          key: flight-state-${{ github.run_id }}
          restore-keys: |
            flight-state-

      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node monitor.js

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            elal-nyc-state.json
            elal-nyc-lastsummary.txt
          key: flight-state-${{ github.run_id }}
