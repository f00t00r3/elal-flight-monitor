name: El Al Flight Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: flight-monitor
  cancel-in-progress: false

jobs:
  check-flights:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node monitor.js

      - name: Save state
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin main 2>/dev/null || true
          git add -f elal-nyc-state.json elal-nyc-lastsummary.txt 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "state [skip ci]" && git push) || true
